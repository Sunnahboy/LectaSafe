<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LectaSafe Recorder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-container">

      <div class="popup-header">
        <h1 class="popup-title">LectaSafe</h1>
        <!-- Opens the options page to configure API key + server URL -->
        <button id="options-btn" class="options-icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>

      <div class="status-container">
        <div id="status-indicator" class="status-indicator"></div>
        <span id="status-text" class="status-text">Ready to record</span>
      </div>

      <!-- Recording timer — hidden when not recording -->
      <div id="recording-timer" class="recording-timer" style="display:none;">00:00</div>

      <button id="record-toggle" class="record-button">
        <span id="record-text">Start Recording</span>
      </button>

      <!-- Upload status — shown after a flush attempt -->
      <div id="upload-status" class="upload-status"></div>

      <div class="dashboard-link">
        <a href="https://your-dashboard-url.com" target="_blank" class="dashboard-button">
          Open Dashboard ↗
        </a>
      </div>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
